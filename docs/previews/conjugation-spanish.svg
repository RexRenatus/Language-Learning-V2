<rect x="14" y="438" width="532" height="58" rx="4" fill="#1f1f38"/><rect x="14" y="438" width="3" height="58" rx="1.5" fill="#d4af37"/>
<text x="26" y="454" font-family="Inter,sans-serif" font-size="10" fill="#d4af37" font-weight="800" letter-spacing="2">— CORE LOGIC —</text>
<text x="26" y="472" font-family="Georgia,serif" font-size="12" fill="#f0e6d3">The present indicative first-person singular is used here to</text>
<text x="26" y="488" font-family="Georgia,serif" font-size="12" fill="#f0e6d3">describe a habitual action performed by the speaker.</text>
<rect x="14" y="504" width="532" height="42" rx="4" fill="#1f1f38"/><rect x="14" y="504" width="3" height="42" rx="1.5" fill="#c9b037"/>
<text x="26" y="520" font-family="Inter,sans-serif" font-size="10" fill="#c9b037" font-weight="800" letter-spacing="2">— MEMORY AID —</text>
<text x="26" y="538" font-family="Georgia,serif" font-size="12" fill="#f0e6d3">-o = 1sg present indicative of -ar verbs.</text>
<rect x="14" y="558" width="94.8" height="22" rx="4" fill="#1f1f38" stroke="#c9b037" stroke-width="0.7"/>
