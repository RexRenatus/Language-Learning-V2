<text x="26" y="132" font-family="Georgia,serif" font-size="14" fill="#f0e6d3">Normalmente <tspan fill="#d4af37" font-weight="700">____</tspan> con mi madre por teléfono todos los domingos por la tarde.</text>
<text x="26" y="166" font-family="Georgia,serif" font-size="11" fill="#a8a4b8" font-style="italic">I usually talk to my mother on the phone every Sunday afternoon.</text>
<text x="14" y="208" font-family="Georgia,serif" font-size="12" fill="#c9b037" font-style="italic">Which fits?</text>
