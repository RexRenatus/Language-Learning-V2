<text x="82" y="64" font-family="Georgia,serif" font-size="14" fill="#f0e6d3">a</text>
<text x="14" y="84" font-family="Inter,sans-serif" font-size="10" fill="#c9b037" font-weight="700" letter-spacing="1.2">USE:</text>
<text x="48" y="84" font-family="Georgia,serif" font-size="13" fill="#f0e6d3" font-style="italic">to (destination), personal-a, indirect object</text>
<rect x="14" y="100" width="532" height="80" rx="4" fill="#1f1f38"/><rect x="14" y="100" width="3" height="80" rx="1.5" fill="#d4af37"/>
<text x="26" y="128" font-family="Georgia,serif" font-size="14" fill="#f0e6d3">El camarero trajo la cuenta rápidamente a nuestra mesa redonda.</text>
<text x="26" y="166" font-family="Georgia,serif" font-size="11" fill="#a8a4b8" font-style="italic">The waiter brought the bill quickly to our round table.</text>
