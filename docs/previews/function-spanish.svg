<rect x="14" y="396" width="532" height="32" rx="4" fill="#1a2e26" stroke="#4ec27e" stroke-width="1"/><rect x="14" y="396" width="3" height="32" rx="1.5" fill="#4ec27e"/>
<text x="26" y="416" font-family="Inter,sans-serif" font-size="12" fill="#b6e6c8" font-weight="800">✓ ANSWER: B —</text>
<text x="170" y="416" font-family="Georgia,serif" font-size="13" fill="#f0e6d3" font-weight="700">a</text>
<rect x="14" y="438" width="532" height="58" rx="4" fill="#1f1f38"/><rect x="14" y="438" width="3" height="58" rx="1.5" fill="#d4af37"/>
<text x="26" y="454" font-family="Inter,sans-serif" font-size="10" fill="#d4af37" font-weight="800" letter-spacing="2">— CORE LOGIC —</text>
<text x="26" y="472" font-family="Georgia,serif" font-size="12" fill="#f0e6d3">The preposition a functions as a directional marker indicating</text>
<text x="26" y="488" font-family="Georgia,serif" font-size="12" fill="#f0e6d3">the destination of the action performed by the verb traer.</text>
<rect x="14" y="504" width="532" height="42" rx="4" fill="#1f1f38"/><rect x="14" y="504" width="3" height="42" rx="1.5" fill="#c9b037"/>
<text x="26" y="520" font-family="Inter,sans-serif" font-size="10" fill="#c9b037" font-weight="800" letter-spacing="2">— MEMORY AID —</text>
<text x="26" y="538" font-family="Georgia,serif" font-size="12" fill="#f0e6d3">a = direction-toward / personal-a / indirect object.</text>
<rect x="14" y="558" width="66.8" height="22" rx="4" fill="#1f1f38" stroke="#c9b037" stroke-width="0.7"/>
<text x="21" y="573" font-family="Inter,sans-serif" font-size="9" fill="#c9b037" font-weight="700" letter-spacing="0.8">LANG:</text>
<text x="52.8" y="573" font-family="Inter,sans-serif" font-size="10" fill="#f0e6d3">ES</text>
