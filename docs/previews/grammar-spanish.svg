<g transform="translate(464 6)"><rect width="86" height="22" rx="11" fill="#2a2348" stroke="#d4af37" stroke-width="1"/><text x="43" y="15" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#d4af37" font-weight="700" letter-spacing="0.5">GRAMMAR</text></g>
<line x1="14" y1="42" x2="546" y2="42" stroke="#d4af37" stroke-width="0.6" opacity="0.65"/>
<text x="14" y="64" font-family="Inter,sans-serif" font-size="11" fill="#c9b037" font-weight="700" letter-spacing="1.2">PATTERN:</text>
<text x="75" y="64" font-family="Georgia,serif" font-size="14" fill="#f0e6d3">comparativos (más/menos que)</text>
<text x="14" y="84" font-family="Inter,sans-serif" font-size="10" fill="#c9b037" font-weight="700" letter-spacing="1.2">USE:</text>
<text x="48" y="84" font-family="Georgia,serif" font-size="13" fill="#f0e6d3" font-style="italic">más alto que / menos rápido que</text>
<rect x="14" y="100" width="532" height="80" rx="4" fill="#1f1f38"/><rect x="14" y="100" width="3" height="80" rx="1.5" fill="#d4af37"/>
<text x="26" y="138" font-family="Georgia,serif" font-size="15" fill="#f0e6d3">El café con leche es <tspan fill="#d4af37" font-weight="700">____</tspan> el zumo.</text>
<text x="26" y="166" font-family="Georgia,serif" font-size="11" fill="#a8a4b8" font-style="italic">Coffee with milk is cheaper than the juice.</text>
<text x="14" y="208" font-family="Georgia,serif" font-size="12" fill="#c9b037" font-style="italic">Which fits?</text>
<rect x="14" y="222" width="532" height="36" rx="4" fill="#1f1f38" stroke="none" stroke-width="0"/>
<circle cx="36" cy="240" r="13" fill="#d4af37"/>
<text x="36" y="245" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="800" fill="#1a1a2e">A</text>
<text x="58" y="245" font-family="Inter,sans-serif" font-size="13" fill="#f0e6d3" >muy barato que</text>
<rect x="14" y="264" width="532" height="36" rx="4" fill="#1f1f38" stroke="none" stroke-width="0"/>
<circle cx="36" cy="282" r="13" fill="#d4af37"/>
<text x="36" y="287" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="800" fill="#1a1a2e">B</text>
<text x="58" y="287" font-family="Inter,sans-serif" font-size="13" fill="#f0e6d3" >tan barato como</text>
<rect x="14" y="306" width="532" height="36" rx="4" fill="#1f1f38" stroke="none" stroke-width="0"/>
<circle cx="36" cy="324" r="13" fill="#d4af37"/>
<text x="36" y="329" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="800" fill="#1a1a2e">C</text>
<text x="58" y="329" font-family="Inter,sans-serif" font-size="13" fill="#f0e6d3" >el más barato</text>
<rect x="14" y="348" width="532" height="36" rx="4" fill="#1f1f38" stroke="none" stroke-width="0"/>
<circle cx="36" cy="366" r="13" fill="#d4af37"/>
<text x="36" y="371" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="800" fill="#1a1a2e">D</text>
<text x="58" y="371" font-family="Inter,sans-serif" font-size="13" fill="#f0e6d3" >más barato que</text>
  </g>
  <g transform="translate(620 80)">
    <rect width="560" height="900" rx="8" fill="#161629" stroke="#d4af37" stroke-width="1.2"/>
    <text x="20" y="22" font-family="Menlo,Consolas,monospace" font-size="11" fill="#d4af37" opacity="0.75">Q-S-G-0001</text>
<g transform="translate(464 6)"><rect width="86" height="22" rx="11" fill="#2a2348" stroke="#d4af37" stroke-width="1"/><text x="43" y="15" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#d4af37" font-weight="700" letter-spacing="0.5">GRAMMAR</text></g>
<line x1="14" y1="42" x2="546" y2="42" stroke="#d4af37" stroke-width="0.6" opacity="0.65"/>
<text x="14" y="64" font-family="Inter,sans-serif" font-size="11" fill="#c9b037" font-weight="700" letter-spacing="1.2">PATTERN:</text>
<text x="75" y="64" font-family="Georgia,serif" font-size="14" fill="#f0e6d3">comparativos (más/menos que)</text>
<text x="14" y="84" font-family="Inter,sans-serif" font-size="10" fill="#c9b037" font-weight="700" letter-spacing="1.2">USE:</text>
<text x="48" y="84" font-family="Georgia,serif" font-size="13" fill="#f0e6d3" font-style="italic">más alto que / menos rápido que</text>
<rect x="14" y="100" width="532" height="80" rx="4" fill="#1f1f38"/><rect x="14" y="100" width="3" height="80" rx="1.5" fill="#d4af37"/>
<text x="26" y="128" font-family="Georgia,serif" font-size="14" fill="#f0e6d3">El café con leche es más barato que el zumo.</text>
<text x="26" y="166" font-family="Georgia,serif" font-size="11" fill="#a8a4b8" font-style="italic">Coffee with milk is cheaper than the juice.</text>
<rect x="14" y="222" width="532" height="36" rx="4" fill="#1f1f38" stroke="none" stroke-width="0"/>
<circle cx="36" cy="240" r="13" fill="#d4af37"/>
<text x="36" y="245" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="800" fill="#1a1a2e">A</text>
<text x="58" y="245" font-family="Inter,sans-serif" font-size="13" fill="#f0e6d3" >muy barato que</text>
<rect x="14" y="264" width="532" height="36" rx="4" fill="#1f1f38" stroke="none" stroke-width="0"/>
<circle cx="36" cy="282" r="13" fill="#d4af37"/>
<text x="36" y="287" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="800" fill="#1a1a2e">B</text>
<text x="58" y="287" font-family="Inter,sans-serif" font-size="13" fill="#f0e6d3" >tan barato como</text>
<rect x="14" y="306" width="532" height="36" rx="4" fill="#1f1f38" stroke="none" stroke-width="0"/>
<circle cx="36" cy="324" r="13" fill="#d4af37"/>
<text x="36" y="329" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="800" fill="#1a1a2e">C</text>
<text x="58" y="329" font-family="Inter,sans-serif" font-size="13" fill="#f0e6d3" >el más barato</text>
<rect x="14" y="348" width="532" height="36" rx="4" fill="#1a2e26" stroke="#4ec27e" stroke-width="1"/>
<circle cx="36" cy="366" r="13" fill="#4ec27e"/>
<text x="36" y="371" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="800" fill="#1a1a2e">D</text>
<text x="58" y="371" font-family="Inter,sans-serif" font-size="13" fill="#d4af37" font-weight="700">más barato que</text>
<text x="525" y="371" text-anchor="end" font-family="Inter,sans-serif" font-size="14" fill="#4ec27e" font-weight="800">✓</text>
<rect x="14" y="396" width="532" height="32" rx="4" fill="#1a2e26" stroke="#4ec27e" stroke-width="1"/><rect x="14" y="396" width="3" height="32" rx="1.5" fill="#4ec27e"/>
<text x="26" y="416" font-family="Inter,sans-serif" font-size="12" fill="#b6e6c8" font-weight="800">✓ ANSWER: D —</text>
<text x="170" y="416" font-family="Georgia,serif" font-size="13" fill="#f0e6d3" font-weight="700">más barato que</text>
<rect x="14" y="438" width="532" height="74" rx="4" fill="#1f1f38"/><rect x="14" y="438" width="3" height="74" rx="1.5" fill="#d4af37"/>
<text x="26" y="454" font-family="Inter,sans-serif" font-size="10" fill="#d4af37" font-weight="800" letter-spacing="2">— CORE LOGIC —</text>
<text x="26" y="472" font-family="Georgia,serif" font-size="12" fill="#f0e6d3">The comparative of inequality construction uses the formula más</text>
<text x="26" y="488" font-family="Georgia,serif" font-size="12" fill="#f0e6d3">followed by an adjective and the conjunction que to compare two</text>
<text x="26" y="504" font-family="Georgia,serif" font-size="12" fill="#f0e6d3">nouns.</text>
<rect x="14" y="520" width="532" height="58" rx="4" fill="#1f1f38"/><rect x="14" y="520" width="3" height="58" rx="1.5" fill="#c9b037"/>
<text x="26" y="536" font-family="Inter,sans-serif" font-size="10" fill="#c9b037" font-weight="800" letter-spacing="2">— MEMORY AID —</text>
<text x="26" y="554" font-family="Georgia,serif" font-size="12" fill="#f0e6d3">más / menos + adjetivo + que = comparative of superiority /</text>
<text x="26" y="570" font-family="Georgia,serif" font-size="12" fill="#f0e6d3">inferiority.</text>
<rect x="14" y="590" width="66.8" height="22" rx="4" fill="#1f1f38" stroke="#c9b037" stroke-width="0.7"/>
<text x="21" y="605" font-family="Inter,sans-serif" font-size="9" fill="#c9b037" font-weight="700" letter-spacing="0.8">CEFR:</text>
<text x="52.8" y="605" font-family="Inter,sans-serif" font-size="10" fill="#f0e6d3">A1</text>
<rect x="86.8" y="590" width="66.8" height="22" rx="4" fill="#1f1f38" stroke="#c9b037" stroke-width="0.7"/>
<text x="93.8" y="605" font-family="Inter,sans-serif" font-size="9" fill="#c9b037" font-weight="700" letter-spacing="0.8">LANG:</text>
<text x="125.6" y="605" font-family="Inter,sans-serif" font-size="10" fill="#f0e6d3">ES</text>
  </g>
</svg>
