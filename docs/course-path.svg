<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 900" width="1280" height="900">
  <defs>
    <marker id="cah" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#d4af37"/>
    </marker>
    <linearGradient id="cefrbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ec27e"/>
      <stop offset="40%" stop-color="#7cc47a"/>
      <stop offset="70%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#e07b53"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="900" fill="#1a1a2e"/>

  <text x="60" y="56" font-family="Inter, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#d4af37" letter-spacing="6">— T H E   C O U R S E   ( F L A G S H I P )   —</text>
  <text x="60" y="82" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#a8a4b8">A structured A1→native course: study units in order. Each unit is a CEFR can-do lesson built from the type-deck content pool.</text>
  <line x1="60" y1="96" x2="1220" y2="96" stroke="#d4af37" stroke-width="0.7" opacity="0.45"/>

  <!-- ===================== PER-UNIT LESSON LOOP ===================== -->
  <text x="60" y="134" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#d4af37" letter-spacing="2">EVERY UNIT — THE 5-STEP LESSON LOOP</text>
  <text x="60" y="156" font-family="Georgia, serif" font-size="12.5" font-style="italic" fill="#9aa0b5">Five card types, ZERO multiple-choice — every card tests active knowledge. Native-speaker neural audio throughout.</text>

  <g font-family="Inter, 'Segoe UI', sans-serif">
    <!-- step boxes: 5 across -->
    <!-- 0 Dialogue -->
    <g transform="translate(60 178)">
      <rect width="210" height="92" rx="8" fill="#1f2a24" stroke="#4ec27e" stroke-width="1.2"/>
      <text x="16" y="28" font-size="13" font-weight="700" fill="#4ec27e">0 · DIALOGUE</text>
      <text x="16" y="52" font-size="12.5" fill="#f0e6d3">Comprehensible input</text>
      <text x="16" y="72" font-size="12" fill="#9aa0b5">listen + understand (audio)</text>
    </g>
    <line x1="270" y1="224" x2="296" y2="224" stroke="#d4af37" stroke-width="1.6" marker-end="url(#cah)"/>
    <!-- 1 Vocab -->
    <g transform="translate(298 178)">
      <rect width="210" height="92" rx="8" fill="#1f1f38" stroke="#c9b037" stroke-width="1"/>
      <text x="16" y="28" font-size="13" font-weight="700" fill="#d4af37">1 · VOCAB</text>
      <text x="16" y="52" font-size="12.5" fill="#f0e6d3">Type the word + listen</text>
      <text x="16" y="72" font-size="12" fill="#9aa0b5">themed production + listening</text>
    </g>
    <line x1="508" y1="224" x2="534" y2="224" stroke="#d4af37" stroke-width="1.6" marker-end="url(#cah)"/>
    <!-- 2 Grammar -->
    <g transform="translate(536 178)">
      <rect width="210" height="92" rx="8" fill="#1f1f38" stroke="#c9b037" stroke-width="1"/>
      <text x="16" y="28" font-size="13" font-weight="700" fill="#d4af37">2 · GRAMMAR</text>
      <text x="16" y="52" font-size="12.5" fill="#f0e6d3">Type the form (cloze)</text>
      <text x="16" y="72" font-size="12" fill="#9aa0b5">textbook-sequenced</text>
    </g>
    <line x1="746" y1="224" x2="772" y2="224" stroke="#d4af37" stroke-width="1.6" marker-end="url(#cah)"/>
    <!-- 3 Transform -->
    <g transform="translate(774 178)">
      <rect width="210" height="92" rx="8" fill="#1f1f38" stroke="#c9b037" stroke-width="1"/>
      <text x="16" y="28" font-size="13" font-weight="700" fill="#d4af37">3 · TRANSFORM</text>
      <text x="16" y="52" font-size="12.5" fill="#f0e6d3">Apply the rule</text>
      <text x="16" y="72" font-size="12" fill="#9aa0b5">e.g. present → past</text>
    </g>
    <line x1="984" y1="224" x2="1010" y2="224" stroke="#d4af37" stroke-width="1.6" marker-end="url(#cah)"/>
    <!-- 4 Dictation -->
    <g transform="translate(1012 178)">
      <rect width="208" height="92" rx="8" fill="#1f1f38" stroke="#c9b037" stroke-width="1"/>
      <text x="16" y="28" font-size="13" font-weight="700" fill="#d4af37">4 · DICTATION</text>
      <text x="16" y="52" font-size="12.5" fill="#f0e6d3">Hear → type</text>
      <text x="16" y="72" font-size="12" fill="#9aa0b5">spelling + listening</text>
    </g>
  </g>

  <line x1="60" y1="306" x2="1220" y2="306" stroke="#d4af37" stroke-width="0.5" opacity="0.3"/>

  <!-- ===================== A1 → B2 UNIT PROGRESSION ===================== -->
  <text x="60" y="344" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#d4af37" letter-spacing="2">A1 → NATIVE UNIT PROGRESSION (PILOT + ROADMAP)</text>
  <text x="60" y="366" font-family="Georgia, serif" font-size="12.5" font-style="italic" fill="#9aa0b5">Grammar sequenced like a textbook around hub units; vocab grouped by theme per unit. Pilot shipped for Spanish + Japanese.</text>

  <!-- CEFR spectrum bar -->
  <g transform="translate(60 388)">
    <rect width="1160" height="14" rx="7" fill="url(#cefrbar)"/>
    <text x="40"   y="34" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#4ec27e">A1</text>
    <text x="330"  y="34" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#7cc47a">A2</text>
    <text x="640"  y="34" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#d4af37">B1</text>
    <text x="930"  y="34" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#e07b53">B2</text>
    <text x="1150" y="34" text-anchor="end" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#7d7a90">→ C1 by Dec 2028</text>
  </g>

  <!-- Spanish lane -->
  <g font-family="Inter, 'Segoe UI', sans-serif">
    <text x="60" y="460" font-size="15" font-weight="700" fill="#f0e6d3">Spanish</text>
    <text x="60" y="478" font-size="11.5" fill="#9aa0b5">grammar spine</text>
    <!-- grammar spine nodes -->
    <g transform="translate(160 432)">
      <rect width="150" height="40" rx="6" fill="#1f2a24" stroke="#4ec27e" stroke-width="1"/>
      <text x="75" y="18" text-anchor="middle" font-size="11.5" font-weight="700" fill="#b6e6c8">ser · estar</text>
      <text x="75" y="33" text-anchor="middle" font-size="10.5" fill="#9aa0b5">U1–2 · A1</text>
    </g>
    <line x1="310" y1="452" x2="336" y2="452" stroke="#d4af37" stroke-width="1.4" marker-end="url(#cah)"/>
    <g transform="translate(338 432)">
      <rect width="150" height="40" rx="6" fill="#1f1f38" stroke="#c9b037" stroke-width="1"/>
      <text x="75" y="18" text-anchor="middle" font-size="11.5" font-weight="700" fill="#f0e6d3">present tense</text>
      <text x="75" y="33" text-anchor="middle" font-size="10.5" fill="#9aa0b5">A1</text>
    </g>
    <line x1="488" y1="452" x2="514" y2="452" stroke="#d4af37" stroke-width="1.4" marker-end="url(#cah)"/>
    <g transform="translate(516 432)">
      <rect width="150" height="40" rx="6" fill="#1f1f38" stroke="#c9b037" stroke-width="1"/>
      <text x="75" y="18" text-anchor="middle" font-size="11.5" font-weight="700" fill="#f0e6d3">past tenses</text>
      <text x="75" y="33" text-anchor="middle" font-size="10.5" fill="#9aa0b5">A2 · pret/imperf</text>
    </g>
    <line x1="666" y1="452" x2="692" y2="452" stroke="#d4af37" stroke-width="1.4" marker-end="url(#cah)"/>
    <!-- subjunctive hub -->
    <g transform="translate(694 428)">
      <rect width="170" height="48" rx="6" fill="#2a2348" stroke="#d4af37" stroke-width="1.6"/>
      <text x="85" y="20" text-anchor="middle" font-size="11.5" font-weight="700" fill="#d4af37">SUBJUNCTIVE hub</text>
      <text x="85" y="37" text-anchor="middle" font-size="10.5" fill="#c9b037">U22 · B1 · grammar_hub</text>
    </g>
    <!-- es summary chip -->
    <g transform="translate(900 428)">
      <rect width="320" height="48" rx="6" fill="#1f1f38" stroke="#9b8ac4" stroke-width="1"/>
      <text x="16" y="20" font-size="12" font-weight="700" fill="#f0e6d3">Pilot: 22 units · A1→B1</text>
      <text x="16" y="38" font-size="11.5" fill="#9aa0b5">18,102 cards · 8,815 vocab · ~90 MB · +~18 units → B2</text>
    </g>
  </g>

  <!-- Japanese lane -->
  <g font-family="Inter, 'Segoe UI', sans-serif">
    <text x="60" y="548" font-size="15" font-weight="700" fill="#f0e6d3">Japanese</text>
    <text x="60" y="566" font-size="11.5" fill="#9aa0b5">grammar spine</text>
    <g transform="translate(160 520)">
      <rect width="150" height="40" rx="6" fill="#1f2a24" stroke="#4ec27e" stroke-width="1"/>
      <text x="75" y="18" text-anchor="middle" font-size="11.5" font-weight="700" fill="#b6e6c8">です</text>
      <text x="75" y="33" text-anchor="middle" font-size="10.5" fill="#9aa0b5">U1 · A1</text>
    </g>
    <line x1="310" y1="540" x2="336" y2="540" stroke="#d4af37" stroke-width="1.4" marker-end="url(#cah)"/>
    <g transform="translate(338 520)">
      <rect width="150" height="40" rx="6" fill="#1f1f38" stroke="#c9b037" stroke-width="1"/>
      <text x="75" y="18" text-anchor="middle" font-size="11.5" font-weight="700" fill="#f0e6d3">polite forms</text>
      <text x="75" y="33" text-anchor="middle" font-size="10.5" fill="#9aa0b5">A1 · present/past</text>
    </g>
    <line x1="488" y1="540" x2="514" y2="540" stroke="#d4af37" stroke-width="1.4" marker-end="url(#cah)"/>
    <!-- te-form hub -->
    <g transform="translate(516 516)">
      <rect width="170" height="48" rx="6" fill="#2a2348" stroke="#d4af37" stroke-width="1.6"/>
      <text x="85" y="20" text-anchor="middle" font-size="11.5" font-weight="700" fill="#d4af37">て-FORM hub</text>
      <text x="85" y="37" text-anchor="middle" font-size="10.5" fill="#c9b037">U6 · A1 · grammar_hub</text>
    </g>
    <line x1="686" y1="540" x2="712" y2="540" stroke="#d4af37" stroke-width="1.4" marker-end="url(#cah)"/>
    <g transform="translate(714 520)">
      <rect width="150" height="40" rx="6" fill="#1f1f38" stroke="#c9b037" stroke-width="1"/>
      <text x="75" y="18" text-anchor="middle" font-size="11.5" font-weight="700" fill="#f0e6d3">conditionals</text>
      <text x="75" y="33" text-anchor="middle" font-size="10.5" fill="#9aa0b5">A2</text>
    </g>
    <g transform="translate(900 516)">
      <rect width="320" height="48" rx="6" fill="#1f1f38" stroke="#9b8ac4" stroke-width="1"/>
      <text x="16" y="20" font-size="12" font-weight="700" fill="#f0e6d3">Pilot: 20 units · A1→A2</text>
      <text x="16" y="38" font-size="11.5" fill="#9aa0b5">6,605 cards · 3,083 vocab · ~27 MB · +N3/N2 → B2</text>
    </g>
  </g>

  <line x1="60" y1="604" x2="1220" y2="604" stroke="#d4af37" stroke-width="0.5" opacity="0.3"/>

  <!-- ===================== ROADMAP TO B2 ===================== -->
  <text x="60" y="642" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#d4af37" letter-spacing="2">PRODUCTION ROADMAP TO B2 (ESTIMATED UNITS · ~2.5 GRAMMAR POINTS / UNIT)</text>

  <g font-family="Inter, 'Segoe UI', sans-serif">
    <!-- header -->
    <g transform="translate(60 660)">
      <rect width="1160" height="34" rx="6" fill="#2a2348"/>
      <text x="20"  y="22" font-size="12" font-weight="700" fill="#d4af37" letter-spacing="1">LANGUAGE</text>
      <text x="240" y="22" font-size="12" font-weight="700" fill="#d4af37" letter-spacing="1">BUILT TODAY</text>
      <text x="520" y="22" font-size="12" font-weight="700" fill="#d4af37" letter-spacing="1">~UNITS TO B2</text>
      <text x="740" y="22" font-size="12" font-weight="700" fill="#d4af37" letter-spacing="1">NEXT AUTHORING STEP</text>
    </g>
    <!-- es -->
    <g transform="translate(60 698)"><rect width="1160" height="34" rx="4" fill="#1f1f38"/>
      <text x="20"  y="22" font-size="13" font-weight="700" fill="#f0e6d3">Spanish</text>
      <text x="240" y="22" font-size="13" fill="#b6e6c8">22 units → B1</text>
      <text x="520" y="22" font-size="13" fill="#d4af37" font-weight="700">~40</text>
      <text x="740" y="22" font-size="12.5" fill="#9aa0b5">author +~18 units of B2 grammar (built 22→B1)</text></g>
    <!-- ja -->
    <g transform="translate(60 736)"><rect width="1160" height="34" rx="4" fill="#1c1c34"/>
      <text x="20"  y="22" font-size="13" font-weight="700" fill="#f0e6d3">Japanese</text>
      <text x="240" y="22" font-size="13" fill="#b6e6c8">20 units → A2</text>
      <text x="520" y="22" font-size="13" fill="#d4af37" font-weight="700">~55</text>
      <text x="740" y="22" font-size="12.5" fill="#9aa0b5">author N3 + N2 grammar (built 20→A2)</text></g>
    <!-- fr -->
    <g transform="translate(60 774)"><rect width="1160" height="34" rx="4" fill="#1f1f38"/>
      <text x="20"  y="22" font-size="13" font-weight="700" fill="#f0e6d3">French</text>
      <text x="240" y="22" font-size="13" fill="#8e8aa0">0 built (pool ready)</text>
      <text x="520" y="22" font-size="13" fill="#d4af37" font-weight="700">~40</text>
      <text x="740" y="22" font-size="12.5" fill="#9aa0b5">course not built — grammar from scratch; engine ready</text></g>
    <!-- zh -->
    <g transform="translate(60 812)"><rect width="1160" height="34" rx="4" fill="#1c1c34"/>
      <text x="20"  y="22" font-size="13" font-weight="700" fill="#f0e6d3">Chinese</text>
      <text x="240" y="22" font-size="13" fill="#8e8aa0">0 built (pool ready)</text>
      <text x="520" y="22" font-size="13" fill="#d4af37" font-weight="700">~48</text>
      <text x="740" y="22" font-size="12.5" fill="#9aa0b5">course to build (pool → A2); engine ready</text></g>
    <!-- ko -->
    <g transform="translate(60 850)"><rect width="1160" height="34" rx="4" fill="#1f1f38"/>
      <text x="20"  y="22" font-size="13" font-weight="700" fill="#f0e6d3">Korean</text>
      <text x="240" y="22" font-size="13" fill="#8e8aa0">0 built (pool ready)</text>
      <text x="520" y="22" font-size="13" fill="#d4af37" font-weight="700">~48</text>
      <text x="740" y="22" font-size="12.5" fill="#9aa0b5">course to build (pool → A2); engine ready</text></g>
  </g>

  <text x="60" y="892" font-family="Georgia, serif" font-size="11.5" font-style="italic" fill="#7d7a90">B2 grammar exists for no language yet and must be authored; fr/zh/ko courses are not built yet (the assembler engine is ready). Goal: C1 across 5 languages by Dec 2028.</text>
</svg>
