<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 900" width="1280" height="900">
  <defs>
    <marker id="cah" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#d4af37"/>
    </marker>
    <linearGradient id="cefrbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ec27e"/>
      <stop offset="40%" stop-color="#7cc47a"/>
      <stop offset="70%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#e07b53"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="900" fill="#1a1a2e"/>

  <text x="60" y="56" font-family="Inter, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#d4af37" letter-spacing="6">— T H E   C O U R S E   ( F L A G S H I P ) —</text>
  <text x="60" y="82" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#a8a4b8">A structured A1→native course, studied unit by unit. All 5 languages now ship the complete A1→C2 ladder — 416 units · 156,593 cards · 72,567 vocab.</text>
  <line x1="60" y1="96" x2="1220" y2="96" stroke="#d4af37" stroke-width="0.7" opacity="0.45"/>

  <!-- ===================== FROM-ZERO FOUNDATION ONSET ===================== -->
  <text x="60" y="130" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#d4af37" letter-spacing="2">EVERY COURSE OPENS WITH 4 FROM-ZERO FOUNDATION UNITS (BEFORE GRAMMAR)</text>

  <g font-family="Inter, 'Segoe UI', sans-serif">
    <!-- F1 writing system + pronunciation -->
    <g transform="translate(60 144)">
      <rect width="272" height="70" rx="8" fill="#1f2a24" stroke="#4ec27e" stroke-width="1.2"/>
      <text x="14" y="26" font-size="12.5" font-weight="700" fill="#4ec27e">F1 · WRITING + PRONUNCIATION</text>
      <text x="14" y="46" font-size="11.5" fill="#f0e6d3">letter / sound cards</text>
      <text x="14" y="62" font-size="11" fill="#9aa0b5">show IPA + phoneme-forced audio</text>
    </g>
    <line x1="332" y1="179" x2="356" y2="179" stroke="#d4af37" stroke-width="1.4" marker-end="url(#cah)"/>
    <!-- F2 numbers -->
    <g transform="translate(358 144)">
      <rect width="272" height="70" rx="8" fill="#1f2a24" stroke="#4ec27e" stroke-width="1.2"/>
      <text x="14" y="26" font-size="12.5" font-weight="700" fill="#4ec27e">F2 · NUMBERS</text>
      <text x="14" y="46" font-size="11.5" fill="#f0e6d3">counting from zero</text>
      <text x="14" y="62" font-size="11" fill="#9aa0b5">native vs Sino · 万-grouping · vigesimal</text>
    </g>
    <line x1="630" y1="179" x2="654" y2="179" stroke="#d4af37" stroke-width="1.4" marker-end="url(#cah)"/>
    <!-- F3 colours -->
    <g transform="translate(656 144)">
      <rect width="272" height="70" rx="8" fill="#1f2a24" stroke="#4ec27e" stroke-width="1.2"/>
      <text x="14" y="26" font-size="12.5" font-weight="700" fill="#4ec27e">F3 · COLOURS</text>
      <text x="14" y="46" font-size="11.5" fill="#f0e6d3">core palette</text>
      <text x="14" y="62" font-size="11" fill="#9aa0b5">with agreement</text>
    </g>
    <line x1="928" y1="179" x2="952" y2="179" stroke="#d4af37" stroke-width="1.4" marker-end="url(#cah)"/>
    <!-- F4 days/time + survival -->
    <g transform="translate(954 144)">
      <rect width="266" height="70" rx="8" fill="#1f2a24" stroke="#4ec27e" stroke-width="1.2"/>
      <text x="14" y="26" font-size="12.5" font-weight="700" fill="#4ec27e">F4 · DAYS / TIME</text>
      <text x="14" y="46" font-size="11.5" fill="#f0e6d3">days, time + survival phrases</text>
      <text x="14" y="62" font-size="11" fill="#9aa0b5">first things you can say</text>
    </g>
  </g>

  <line x1="60" y1="234" x2="1220" y2="234" stroke="#d4af37" stroke-width="0.5" opacity="0.3"/>

  <!-- ===================== PER-UNIT LESSON LOOP ===================== -->
  <text x="60" y="266" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#d4af37" letter-spacing="2">THEN EVERY UNIT IS A CEFR CAN-DO LESSON — 5-STEP CORE LOOP + 3 B1+ SKILL STRANDS</text>
  <text x="60" y="287" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#9aa0b5">Eight card types, ZERO multiple-choice — production · listening · dictation, + from B1 mediation · composition · reading. Native-speaker neural audio throughout.</text>

  <g font-family="Inter, 'Segoe UI', sans-serif">
    <!-- step boxes: 5 across -->
    <!-- 0 Dialogue -->
    <g transform="translate(60 300)">
      <rect width="210" height="80" rx="8" fill="#1f2a24" stroke="#4ec27e" stroke-width="1.2"/>
      <text x="16" y="26" font-size="13" font-weight="700" fill="#4ec27e">0 · DIALOGUE</text>
      <text x="16" y="48" font-size="12" fill="#f0e6d3">Comprehensible input</text>
      <text x="16" y="66" font-size="11.5" fill="#9aa0b5">listen + understand (audio)</text>
    </g>
    <line x1="270" y1="340" x2="296" y2="340" stroke="#d4af37" stroke-width="1.6" marker-end="url(#cah)"/>
    <!-- 1 Vocab -->
    <g transform="translate(298 300)">
      <rect width="210" height="80" rx="8" fill="#1f1f38" stroke="#c9b037" stroke-width="1"/>
      <text x="16" y="26" font-size="13" font-weight="700" fill="#d4af37">1 · VOCAB</text>
      <text x="16" y="48" font-size="12" fill="#f0e6d3">Type the word + listen</text>
      <text x="16" y="66" font-size="11.5" fill="#9aa0b5">themed production + listening</text>
    </g>
    <line x1="508" y1="340" x2="534" y2="340" stroke="#d4af37" stroke-width="1.6" marker-end="url(#cah)"/>
    <!-- 2 Grammar -->
    <g transform="translate(536 300)">
      <rect width="210" height="80" rx="8" fill="#1f1f38" stroke="#c9b037" stroke-width="1"/>
      <text x="16" y="26" font-size="13" font-weight="700" fill="#d4af37">2 · GRAMMAR</text>
      <text x="16" y="48" font-size="12" fill="#f0e6d3">Type the form (cloze)</text>
      <text x="16" y="66" font-size="11.5" fill="#9aa0b5">textbook-sequenced</text>
    </g>
    <line x1="746" y1="340" x2="772" y2="340" stroke="#d4af37" stroke-width="1.6" marker-end="url(#cah)"/>
    <!-- 3 Transform -->
    <g transform="translate(774 300)">
      <rect width="210" height="80" rx="8" fill="#1f1f38" stroke="#c9b037" stroke-width="1"/>
      <text x="16" y="26" font-size="13" font-weight="700" fill="#d4af37">3 · TRANSFORM</text>
      <text x="16" y="48" font-size="12" fill="#f0e6d3">Apply the rule</text>
      <text x="16" y="66" font-size="11.5" fill="#9aa0b5">e.g. present → past</text>
    </g>
    <line x1="984" y1="340" x2="1010" y2="340" stroke="#d4af37" stroke-width="1.6" marker-end="url(#cah)"/>
    <!-- 4 Dictation -->
    <g transform="translate(1012 300)">
      <rect width="208" height="80" rx="8" fill="#1f1f38" stroke="#c9b037" stroke-width="1"/>
      <text x="16" y="26" font-size="13" font-weight="700" fill="#d4af37">4 · DICTATION</text>
      <text x="16" y="48" font-size="12" fill="#f0e6d3">Hear → type</text>
      <text x="16" y="66" font-size="11.5" fill="#9aa0b5">spelling + listening</text>
    </g>
  </g>

  <text x="60" y="399" font-family="Inter, sans-serif" font-size="11.5" fill="#9aa0b5">+ from B1 each unit adds three CEFR-2020 skill strands — <tspan fill="#6ec6ff" font-weight="700">5 · MEDIATION</tspan> (relay a source) · <tspan fill="#6ec6ff" font-weight="700">6 · COMPOSITION</tspan> (guided writing) · <tspan fill="#6ec6ff" font-weight="700">7 · READING</tspan> (comprehension)</text>
  <line x1="60" y1="408" x2="1220" y2="408" stroke="#d4af37" stroke-width="0.5" opacity="0.3"/>

  <!-- ===================== A1 → C2 UNIT PROGRESSION (ALL 5, SHIPPED) ===================== -->
  <text x="60" y="440" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#d4af37" letter-spacing="2">A1 → C2 UNIT PROGRESSION — SHIPPED FOR ALL 5 LANGUAGES</text>
  <text x="60" y="461" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#9aa0b5">Grammar sequenced like a textbook around a grammar hub per language; vocab grouped by theme per unit.</text>

  <!-- CEFR spectrum bar -->
  <g transform="translate(60 476)">
    <rect width="1160" height="12" rx="6" fill="url(#cefrbar)"/>
    <text x="20"   y="30" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#4ec27e">A1</text>
    <text x="220"  y="30" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#7cc47a">A2</text>
    <text x="430"  y="30" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#a9bd58">B1</text>
    <text x="640"  y="30" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#d4af37">B2</text>
    <text x="850"  y="30" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#e07b53">C1</text>
    <text x="1010" y="30" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#e07b53">C2</text>
    <text x="1150" y="30" text-anchor="end" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#6fae7e">full ladder shipped</text>
  </g>

  <!-- five language rows: count · grammar hub · cards -->
  <g font-family="Inter, 'Segoe UI', sans-serif">
    <!-- header -->
    <g transform="translate(60 514)">
      <rect width="1160" height="30" rx="6" fill="#2a2348"/>
      <text x="20"  y="20" font-size="11.5" font-weight="700" fill="#d4af37" letter-spacing="1">LANGUAGE</text>
      <text x="200" y="20" font-size="11.5" font-weight="700" fill="#d4af37" letter-spacing="1">A1→C2 UNITS</text>
      <text x="360" y="20" font-size="11.5" font-weight="700" fill="#d4af37" letter-spacing="1">CARDS</text>
      <text x="520" y="20" font-size="11.5" font-weight="700" fill="#d4af37" letter-spacing="1">GRAMMAR HUB</text>
    </g>
    <!-- es -->
    <g transform="translate(60 548)"><rect width="1160" height="32" rx="4" fill="#1f1f38"/>
      <text x="20"  y="21" font-size="13" font-weight="700" fill="#f0e6d3">Spanish</text>
      <text x="200" y="21" font-size="13" fill="#b6e6c8" font-weight="700">79</text>
      <text x="360" y="21" font-size="13" fill="#c8c4d8">37,620</text>
      <text x="520" y="21" font-size="12.5" fill="#d4af37">present subjunctive</text></g>
    <!-- ja -->
    <g transform="translate(60 584)"><rect width="1160" height="32" rx="4" fill="#1c1c34"/>
      <text x="20"  y="21" font-size="13" font-weight="700" fill="#f0e6d3">Japanese</text>
      <text x="200" y="21" font-size="13" fill="#b6e6c8" font-weight="700">87</text>
      <text x="360" y="21" font-size="13" fill="#c8c4d8">24,020</text>
      <text x="520" y="21" font-size="12.5" fill="#d4af37">て-form + plain / N3 pivot</text></g>
    <!-- fr -->
    <g transform="translate(60 620)"><rect width="1160" height="32" rx="4" fill="#1f1f38"/>
      <text x="20"  y="21" font-size="13" font-weight="700" fill="#f0e6d3">French</text>
      <text x="200" y="21" font-size="13" fill="#b6e6c8" font-weight="700">81</text>
      <text x="360" y="21" font-size="13" fill="#c8c4d8">34,499</text>
      <text x="520" y="21" font-size="12.5" fill="#d4af37">passé composé + subjonctif</text></g>
    <!-- zh -->
    <g transform="translate(60 656)"><rect width="1160" height="32" rx="4" fill="#1c1c34"/>
      <text x="20"  y="21" font-size="13" font-weight="700" fill="#f0e6d3">Chinese</text>
      <text x="200" y="21" font-size="13" fill="#b6e6c8" font-weight="700">86</text>
      <text x="360" y="21" font-size="13" fill="#c8c4d8">25,599</text>
      <text x="520" y="21" font-size="12.5" fill="#d4af37">了 + resultative complements</text></g>
    <!-- ko -->
    <g transform="translate(60 692)"><rect width="1160" height="32" rx="4" fill="#1f1f38"/>
      <text x="20"  y="21" font-size="13" font-weight="700" fill="#f0e6d3">Korean</text>
      <text x="200" y="21" font-size="13" fill="#b6e6c8" font-weight="700">83</text>
      <text x="360" y="21" font-size="13" fill="#c8c4d8">34,855</text>
      <text x="520" y="21" font-size="12.5" fill="#d4af37">modifier endings + indirect speech</text></g>
    <!-- totals -->
    <g transform="translate(60 728)"><rect width="1160" height="32" rx="4" fill="#1f2a24" stroke="#4ec27e" stroke-width="1"/><rect width="4" height="32" rx="2" fill="#4ec27e"/>
      <text x="20"  y="21" font-size="13" font-weight="700" fill="#b6e6c8">All 5 — A1→C2</text>
      <text x="200" y="21" font-size="13" fill="#b6e6c8" font-weight="700">416</text>
      <text x="360" y="21" font-size="13" fill="#b6e6c8" font-weight="700">156,593</text>
      <text x="520" y="21" font-size="12.5" fill="#9aa0b5">+ 4 from-zero foundation units each · 72,567 vocab words</text></g>
  </g>

  <line x1="60" y1="784" x2="1220" y2="784" stroke="#d4af37" stroke-width="0.5" opacity="0.3"/>

  <!-- ===================== C1 / C2 BAND — SHIPPED ===================== -->
  <text x="60" y="816" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#d4af37" letter-spacing="2">C1 / C2 BAND — SHIPPED · register · discourse · idiom / collocation · nuance</text>

  <g font-family="Inter, 'Segoe UI', sans-serif">
    <!-- es -->
    <g transform="translate(60 828)">
      <rect width="226" height="46" rx="6" fill="#1f2a24" stroke="#4ec27e" stroke-width="1"/>
      <text x="14" y="22" font-size="12.5" font-weight="700" fill="#f0e6d3">Spanish · C1 / C2 ✓</text>
      <text x="14" y="39" font-size="11" fill="#9aa0b5">DELE C1–C2</text>
    </g>
    <!-- ja -->
    <g transform="translate(294 828)">
      <rect width="226" height="46" rx="6" fill="#1f2a24" stroke="#4ec27e" stroke-width="1"/>
      <text x="14" y="22" font-size="12.5" font-weight="700" fill="#f0e6d3">Japanese · C1 / C2 ✓</text>
      <text x="14" y="39" font-size="11" fill="#9aa0b5">JLPT N1</text>
    </g>
    <!-- fr -->
    <g transform="translate(528 828)">
      <rect width="226" height="46" rx="6" fill="#1f2a24" stroke="#4ec27e" stroke-width="1"/>
      <text x="14" y="22" font-size="12.5" font-weight="700" fill="#f0e6d3">French · C1 / C2 ✓</text>
      <text x="14" y="39" font-size="11" fill="#9aa0b5">DALF C1–C2</text>
    </g>
    <!-- zh -->
    <g transform="translate(762 828)">
      <rect width="226" height="46" rx="6" fill="#1f2a24" stroke="#4ec27e" stroke-width="1"/>
      <text x="14" y="22" font-size="12.5" font-weight="700" fill="#f0e6d3">Chinese · C1 / C2 ✓</text>
      <text x="14" y="39" font-size="11" fill="#9aa0b5">HSK 7–9</text>
    </g>
    <!-- ko -->
    <g transform="translate(996 828)">
      <rect width="224" height="46" rx="6" fill="#1f2a24" stroke="#4ec27e" stroke-width="1"/>
      <text x="14" y="22" font-size="12.5" font-weight="700" fill="#f0e6d3">Korean · C1 / C2 ✓</text>
      <text x="14" y="39" font-size="11" fill="#9aa0b5">TOPIK 6</text>
    </g>
  </g>

  <text x="60" y="892" font-family="Georgia, serif" font-size="11.5" font-style="italic" fill="#7d7a90">The full A1→C2 ladder is shipped for all 5 languages — standards span PCIC/DELE A1–C2 · DELF/DALF · JLPT N5→N1 · HSK 1→9 · TOPIK I→II.</text>
</svg>
